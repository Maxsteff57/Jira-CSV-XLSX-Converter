[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Показывать подробный вывод по умолчанию
addopts = -v --tb=short

# Не останавливаться на первом провале (убрать -x если нужно иное)
# addopts = -v --tb=short -x

# Фильтруем предупреждения которые не относятся к нашему коду
filterwarnings =
    ignore::DeprecationWarning:pandas
    ignore::DeprecationWarning:openpyxl
