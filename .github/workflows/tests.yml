name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: windows-latest   # Windows нужен для winreg и tkinter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pytest
          # tkinterdnd2 опционально — без него drag & drop отключается
          pip install tkinterdnd2 || echo "tkinterdnd2 not available, skipping"

      - name: Run tests
        run: pytest tests/ -v --tb=short
